<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Chasse au Trésor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJwG93sQe0IPqO2n74K8lK0vvzLhSkop6tcm65ZG5gkSb6Y00FZuyzTO5+dh" crossorigin="anonymous">
    <style>
        body {
            background: url('bg.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            height: 100vh;
            font-family: 'Trebuchet MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #FFD700;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
        }

        .poem {
            background-color: rgba(255, 223, 0, 0.1); /* Fond translucide doré */
            border: 2px solid #FFD700; /* Bordure dorée */
            border-radius: 10px;
            padding: 20px;
            color: #FFD700;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            line-height: 1.8em;
            margin: 20px 0;
            text-align: left;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
        }

        .btn-custom {
            background-color: #4caf50;
            color: white;
            padding: 14px 28px;
            margin-top: 20px;
            border-radius: 10px;
            border: 2px solid #FFD700;
            font-size: 1.3em;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .btn-custom:active {
            background-color: #39843c;
            transform: scale(1);
        }

        .treasure-box {
            font-size: 2.5em;
            color: #FFD700;
            text-shadow: 3px 3px 15px rgba(0, 0, 0, 0.5);
            margin-top: 30px;
            font-family: 'Cinzel', serif;
            animation: sparkle 2s infinite alternate;
        }

        @keyframes sparkle {
            0% {
                text-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700, 0 0 45px #FFD700;
            }
            100% {
                text-shadow: 0 0 25px #FFD700, 0 0 50px #FFD700, 0 0 70px #FFD700;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jeu de Chasse au Trésor</h1>
        <div id="main">
            <p>Faites-vous partie de l'équipe chargée de récupérer le trésor ?</p>
            <input type="text" id="response" class="form-control" placeholder="oui/non">
            <button class="btn btn-custom" onclick="startGame()">Envoyer</button>
        </div>
    </div>

    <script>
        const encryptedPassword = "SURFHVVXHU"; // "PROCESSEUR" chiffré
        const correctPassword = "PROCESSEUR";
        const correctCameraCode = "COFFREMAGIQUE";
        let userTokens = 60;

        // Ajouter un écouteur d'événements pour la touche "Entrer" sur la première question
        document.getElementById("response").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                startGame(); // Appel de la fonction startGame() lorsque "Entrer" est pressé
            }
        });

        function startGame() {
            const response = document.getElementById("response").value.trim().toLowerCase();
            const mainDiv = document.getElementById("main");

            if (response === "oui") {
                mainDiv.innerHTML = ` 
                    <div class="poem">
                        Dans un royaume de symboles où les lettres sont en mouvement, <br>
                        Chaque mot cache un secret par un simple glissement. <br>
                        Trois pas en arrière, et le voile se lève, <br>
                        Découvrant le vrai visage, la lettre retrouvée.
                    </div>
                    <p>Mot de passe chiffré : ${encryptedPassword}</p>
                    <p>Veuillez déchiffrer le mot de passe :</p>
                    <input type="text" id="passwordAttempt" class="form-control" placeholder="Mot de passe déchiffré">
                    <button class="btn btn-custom" onclick="checkPassword()">Valider</button>
                `;
                
                // Écouteur pour la touche "Entrer" sur le mot de passe
                document.getElementById("passwordAttempt").addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        checkPassword(); // Appel de la fonction checkPassword() lorsque "Entrer" est pressé
                    }
                });
            } else if (response === "non") {
                mainDiv.innerHTML = `<p>Le programme s'arrête.</p>`;
            } else {
                alert("Réponse invalide. Veuillez répondre par 'oui' ou 'non'.");
            }
        }

        function checkPassword() {
            const attempt = document.getElementById("passwordAttempt").value.trim();
            const mainDiv = document.getElementById("main");

            if (attempt === correctPassword) {
                mainDiv.innerHTML = `
                    <p>Mot de passe déchiffré correctement !</p>
                    <p>L'identifiant de l'interface web des caméras est : admin, le mdp est : MOT_DE_PASSE_CAMERA</p>
                    <p>Veuillez maintenant entrer le code affiché par la caméra :</p>
                    <input type="text" id="cameraCode" class="form-control" placeholder="Code de la caméra">
                    <button class="btn btn-custom" onclick="checkCameraCode()">Envoyer</button>
                `;
                
                // Écouteur pour la touche "Entrer" sur le code de la caméra
                document.getElementById("cameraCode").addEventListener("keydown", function(event) {
                    if (event.key === "Enter") {
                        checkCameraCode(); // Appel de la fonction checkCameraCode() lorsque "Entrer" est pressé
                    }
                });
            } else {
                userTokens = Math.max(10, userTokens - 10);
                alert(`Mot de passe incorrect. Jetons restants : ${userTokens}`);
            }
        }

        function checkCameraCode() {
            const code = document.getElementById("cameraCode").value.trim();
            const mainDiv = document.getElementById("main");

            if (code === correctCameraCode) {
                mainDiv.innerHTML = `<p>Code correct ! Félicitations, vous avez gagné ${userTokens} jetons.</p>
                    <div class="treasure-box">🏆 Trésor récupéré ! 🏆</div>`;
            } else {
                alert("Code incorrect. Veuillez réessayer.");
            }
        }
    </script>
</body>
</html>
